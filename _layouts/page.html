<!DOCTYPE html>
<html lang="tr">
  {% include head.html %}
  <body class="theme-{% if site.resume_theme %}{{ site.resume_theme }}{% endif %}">
    
    <div class="wrapper" itemscope itemtype="http://schema.org/Person">
      {% include navigation.html %}

      <!-- Sayfa Ana İçerik Alanı -->
      <main class="page-main-content">
        <article class="modern-page-card no-print">
          
          <header class="page-header">
            <div class="title-bar">
              <h1 class="header-title" itemprop="name">{{ page.title }}</h1>
              <!-- Belirginleştirilmiş ve kalınlaştırılmış Indigo çizgi -->
              <div class="header-accent-line"></div>
            </div>
          </header>

          <section class="content-section" itemprop="description">
            <div class="resume-item">
              <div class="resume-item-copy">
                {{ content | replace: '&#8617;', '&#8617;&#xfe0e;' }}
              </div>
            </div>
          </section>

        </article>
      </main>

      {% include footer.html %}
    </div>

  </body>
</html>
