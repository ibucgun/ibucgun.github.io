            "@type": "Answer",
            "text": "TMS özel bir cihaz tarafından, yoğunlaştırılmış manyetik atımların ardışık, noktasal olarak odaklanmış bir şekilde, özel beyin bölgelerine gönderilmesiyle beyin hücrelerinin uyarılmasını ve beyin işlevlerinin düzenlenmesini (aktivitesinin artmasını ya da azalmasını) sağlayan, bilimsel olarak etkisi kanıtlanmış ve belirli psikiyatrik hastalıkların tedavisinde kullanım ruhsatı almış bir tedavi yöntemidir."
