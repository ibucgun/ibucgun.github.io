# Blog kategorileri — renk tanımı
# ----------------------------------------------------------------
# Yeni kategori eklemek için:
#   1. _posts/...md front matter'ında: category: "Yeni Kategori"
#   2. Bu dosyaya 3 satır ekle (name + color + bg)
# Eğer kategoriyi buraya eklemezsen, post otomatik default
# (indigo) rengini alır — yine de düzgün görünür.
#
# Alanlar:
#   name  — post front matter'daki "category" değeriyle BİREBİR aynı olmalı
#   color — rozet metin rengi (--cc)
#   bg    — rozet arka plan rengi (--cb)
# ----------------------------------------------------------------

